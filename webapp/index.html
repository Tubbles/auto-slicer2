<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Auto-Slicer Settings</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #fff);
    --text: var(--tg-theme-text-color, #000);
    --hint: var(--tg-theme-hint-color, #999);
    --link: var(--tg-theme-link-color, #2678b6);
    --btn: var(--tg-theme-button-color, #2678b6);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0 12px 80px;
    font-size: 14px;
    -webkit-text-size-adjust: 100%;
  }

  .search-bar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 8px 0;
  }
  .search-bar input {
    width: 100%; padding: 8px 12px;
    border: 1px solid var(--hint);
    border-radius: 8px;
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--link); }

  .tabs {
    display: flex; gap: 8px;
    padding: 8px 0;
  }
  .tab {
    padding: 4px 12px;
    border-radius: 16px;
    border: 1px solid var(--hint);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .tab.active {
    background: var(--btn);
    color: var(--btn-text);
    border-color: var(--btn);
  }

  .preset-row {
    display: flex;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--secondary-bg);
    gap: 8px;
    cursor: pointer;
  }
  .preset-row .setting-info { flex: 1; min-width: 0; }
  .preset-row .setting-label { font-size: 14px; font-weight: 500; }
  .preset-row .setting-desc {
    font-size: 12px;
    color: var(--hint);
    margin-top: 2px;
    display: none;
  }
  .preset-row .setting-desc.show { display: block; }
  .preset-detail-item {
    font-size: 12px;
    font-family: monospace;
    color: var(--text);
    padding: 2px 0;
  }
  .preset-apply-btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: none;
    background: var(--btn);
    color: var(--btn-text);
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .preset-apply-btn:active { opacity: 0.7; }

  .clear-all-btn {
    padding: 4px 12px;
    border-radius: 16px;
    border: 1px solid #e53935;
    background: transparent;
    color: #e53935;
    font-size: 13px;
    cursor: pointer;
  }
  .clear-all-btn:active { opacity: 0.7; }

  .category-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 0 4px;
    border-bottom: 1px solid var(--secondary-bg);
  }

  .setting {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--secondary-bg);
    gap: 8px;
  }
  .setting.hidden { display: none; }
  .setting.modified { background: color-mix(in srgb, var(--link) 8%, transparent); margin: 0 -12px; padding: 10px 12px; }
  .setting-info { flex: 1; min-width: 0; }
  .setting-label {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .setting-desc {
    font-size: 12px;
    color: var(--hint);
    margin-top: 2px;
    display: none;
  }
  .setting-desc.show { display: block; }
  .setting-detail {
    font-size: 11px;
    color: var(--hint);
    margin-top: 4px;
    font-family: monospace;
  }
  .setting-control { flex-shrink: 0; display: flex; align-items: center; gap: 4px; }

  .computed-badge {
    font-size: 11px;
    font-style: italic;
    color: var(--link);
    flex-shrink: 0;
    line-height: 1;
  }
  .computed-badge.overridden {
    color: var(--hint);
    opacity: 0.6;
  }

  .toggle {
    position: relative;
    width: 44px; height: 24px;
    cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--hint);
    border-radius: 12px;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--btn); }
  .toggle-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle input:checked ~ .toggle-knob { left: 22px; }

  .setting-control select {
    padding: 4px 8px;
    border: 1px solid var(--hint);
    border-radius: 6px;
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 13px;
    max-width: 140px;
  }

  .stepper {
    display: flex; align-items: center; gap: 2px;
  }
  .stepper button {
    width: 28px; height: 28px;
    border: 1px solid var(--hint);
    border-radius: 6px;
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper button:active { opacity: 0.7; }
  .stepper input {
    width: 60px; height: 28px;
    text-align: center;
    border: 1px solid var(--hint);
    border-radius: 6px;
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 13px;
  }

  .setting-control input[type="text"] {
    padding: 4px 8px;
    border: 1px solid var(--hint);
    border-radius: 6px;
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 13px;
    width: 120px;
  }

  .setting:has(textarea) { flex-wrap: wrap; }
  .setting:has(textarea) .setting-control { width: 100%; }

  .setting-control textarea {
    padding: 4px 8px;
    border: 1px solid var(--hint);
    border-radius: 6px;
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    width: 100%;
    min-height: 5lh;
    resize: vertical;
  }

  .reset-btn {
    width: 32px; height: 32px;
    border: none; background: transparent;
    color: var(--hint);
    font-size: 22px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .reset-btn:hover { color: var(--text); }

  .star-btn {
    width: 28px; height: 28px;
    border: none; background: transparent;
    color: var(--hint);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }

  .status {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--secondary-bg);
    padding: 6px 12px;
    font-size: 12px;
    color: var(--hint);
    text-align: center;
    z-index: 20;
  }
  .status.error { color: #e53935; }

  .loading {
    text-align: center;
    padding: 40px 0;
    color: var(--hint);
  }

  /* Upload tab */
  .upload-zone {
    border: 2px dashed var(--hint);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    color: var(--hint);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin: 8px 0;
  }
  .upload-zone.dragover {
    border-color: var(--link);
    background: color-mix(in srgb, var(--link) 8%, transparent);
  }
  .upload-zone.has-file {
    border-style: solid;
    border-color: var(--link);
    color: var(--text);
  }
  .upload-zone input { display: none; }

  .upload-viewport {
    width: 100%;
    height: 300px;
    border-radius: 8px;
    overflow: hidden;
    margin: 8px 0;
    background: var(--secondary-bg);
    position: relative;
  }
  .upload-viewport canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  .upload-dims {
    display: grid;
    grid-template-columns: auto 1fr 1fr;
    gap: 4px 12px;
    font-size: 13px;
    margin: 8px 0;
    font-family: monospace;
  }
  .upload-dims-header {
    font-weight: 600;
    color: var(--hint);
    font-size: 11px;
    text-transform: uppercase;
    padding-bottom: 2px;
  }
  .upload-dims-axis { color: var(--hint); font-weight: 600; }
  .upload-dims-warn {
    grid-column: 1 / -1;
    color: #e53935;
    font-weight: 500;
    padding-top: 4px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .upload-dims-bed {
    grid-column: 1 / -1;
    color: var(--hint);
    font-size: 12px;
    padding-top: 2px;
  }

  .upload-actions {
    display: flex;
    gap: 8px;
    margin: 8px 0 0;
    flex-shrink: 0;
  }
  .upload-slice-btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: var(--btn);
    color: var(--btn-text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .upload-slice-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .upload-slice-btn:active:not(:disabled) { opacity: 0.7; }
  .upload-clear-btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--hint);
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .upload-clear-btn:active { opacity: 0.7; }
  .upload-model-list {
    border: 1px solid var(--hint);
    border-radius: 8px;
    margin: 8px 0 0;
  }
  .upload-model-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-bottom: 1px solid var(--hint);
    font-size: 12px;
    color: var(--hint);
  }
  .upload-model-list-header button {
    background: none;
    border: none;
    color: var(--link);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
  }
  .upload-model-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid color-mix(in srgb, var(--hint) 30%, transparent);
  }
  .upload-model-item:last-child { border-bottom: none; }
  .upload-model-item:active { opacity: 0.7; }
  .upload-model-item.active {
    background: color-mix(in srgb, var(--link) 10%, transparent);
    font-weight: 600;
  }
  .upload-model-item input[type="checkbox"] {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    accent-color: var(--btn);
  }
  .upload-model-item .model-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .upload-model-bed-header {
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--hint);
    background: color-mix(in srgb, var(--secondary-bg) 50%, transparent);
    cursor: pointer;
    border-bottom: 1px solid color-mix(in srgb, var(--hint) 30%, transparent);
  }
  .upload-model-bed-header.active {
    color: var(--link);
    background: color-mix(in srgb, var(--link) 8%, transparent);
  }
  .upload-model-bed-header:active { opacity: 0.7; }
  .upload-bed-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 8px 0 0;
    font-size: 14px;
  }
  .upload-bed-nav button {
    background: var(--secondary-bg);
    border: 1px solid var(--hint);
    border-radius: 6px;
    color: var(--text);
    padding: 4px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .upload-bed-nav button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .upload-bed-nav button:active:not(:disabled) { opacity: 0.7; }

  .upload-result {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin: 8px 0;
    white-space: pre-line;
  }
  .upload-result.success {
    background: color-mix(in srgb, #4caf50 12%, var(--secondary-bg));
    color: var(--text);
  }
  .upload-result.failure {
    background: color-mix(in srgb, #e53935 12%, var(--secondary-bg));
    color: var(--text);
  }
</style>
</head>
<body>

<div class="search-bar">
  <input type="search" id="search" placeholder="Search settings..." autocomplete="off">
</div>

<div class="tabs">
  <button class="tab active" data-filter="starred">Starred</button>
  <button class="tab" data-filter="modified">Modified</button>
  <button class="tab" data-filter="presets">Presets</button>
  <button class="tab" data-filter="all">All</button>
  <button class="tab" data-filter="upload">Upload</button>
  <span id="clear-all-container"></span>
</div>

<div id="presets-container" style="display:none"></div>

<div id="upload-container" style="display:none">
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="upload-input" accept=".stl,.3mf,.zip">
    <div id="upload-zone-text">Drag &amp; drop or tap to select<br>STL / 3MF / ZIP</div>
  </div>
  <div class="upload-viewport" id="upload-viewport" style="display:none"></div>
  <div class="upload-bed-nav" id="upload-bed-nav" style="display:none">
    <button id="bed-prev">&lt;</button>
    <span id="bed-label">Bed 1/1</span>
    <button id="bed-next">&gt;</button>
  </div>
  <div class="upload-dims" id="upload-dims" style="display:none"></div>
  <div id="upload-result"></div>
  <div class="upload-actions" id="upload-actions" style="display:none">
    <button class="upload-clear-btn" id="upload-clear-btn">Clear</button>
    <button class="upload-slice-btn" id="upload-slice-btn" disabled>Slice</button>
  </div>
  <div class="upload-model-list" id="upload-model-list" style="display:none"></div>
</div>

<div id="settings-container">
  <div class="loading" id="loading">Loading settings...</div>
</div>

<div class="status" id="status"></div>

<script>
const WebApp = window.Telegram && window.Telegram.WebApp;
if (WebApp) {
  try { WebApp.ready(); } catch(e) {}
  try { WebApp.expand(); } catch(e) {}
}

const params = new URLSearchParams(location.search);
const API_BASE = params.get('api') || '';
const TOKEN = params.get('token') || '';

// Expose for module scripts (three.js upload tab)
window.API_BASE = API_BASE;
window.TOKEN = TOKEN;

let registry = null;
let overrides = {};
let original = {};
let pendingChanges = {};

// Keep window refs in sync for module scripts
function syncGlobals() {
  window.registry = registry;
  window.overrides = overrides;
  window.pendingChanges = pendingChanges;
}
syncGlobals();

let starredKeys = new Set();
let computedValues = {};
let reverseDeps = {};

// --- Auth ---

function authHeaders() {
  return { 'Authorization': 'Bearer ' + TOKEN };
}

function handleAuthError(r) {
  if (r.status === 401) {
    setStatus('Session expired — use /webapp in the bot to reopen.', true);
    return true;
  }
  return false;
}
window.handleAuthError = handleAuthError;

// --- API ---

async function fetchRegistry() {
  const r = await fetch(API_BASE + '/api/registry', { headers: authHeaders() });
  if (handleAuthError(r)) throw new Error('session expired');
  return r.json();
}

async function fetchSettings() {
  const r = await fetch(API_BASE + '/api/settings', { headers: authHeaders() });
  if (handleAuthError(r)) throw new Error('session expired');
  const data = await r.json();
  return data.overrides || {};
}

async function postSettings(payload) {
  const r = await fetch(API_BASE + '/api/settings', {
    method: 'POST',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (handleAuthError(r)) throw new Error('session expired');
  return r.json();
}

async function deleteSettings() {
  const r = await fetch(API_BASE + '/api/settings', {
    method: 'DELETE',
    headers: authHeaders(),
  });
  if (handleAuthError(r)) throw new Error('session expired');
  return r.json();
}

async function fetchStarred() {
  const r = await fetch(API_BASE + '/api/starred', { headers: authHeaders() });
  if (handleAuthError(r)) throw new Error('session expired');
  const data = await r.json();
  return new Set(data.keys || []);
}

async function postEvaluate(pinned) {
  const r = await fetch(API_BASE + '/api/evaluate', {
    method: 'POST',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ overrides: pinned }),
  });
  if (handleAuthError(r)) throw new Error('session expired');
  return r.json();
}

async function postStarred(add, remove) {
  const r = await fetch(API_BASE + '/api/starred', {
    method: 'POST',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ add, remove }),
  });
  if (handleAuthError(r)) throw new Error('session expired');
  const data = await r.json();
  return new Set(data.keys || []);
}

// --- Recompute ---

let _recomputeTimer = null;

function scheduleRecompute() {
  clearTimeout(_recomputeTimer);
  _recomputeTimer = setTimeout(recompute, 200);
}

async function recompute() {
  if (!registry) return;
  // Build the full set of pinned values: overrides + pendingChanges (excluding resets)
  const pinned = {};
  for (const [k, v] of Object.entries(overrides)) pinned[k] = v;
  for (const [k, v] of Object.entries(pendingChanges)) {
    if (v === null) delete pinned[k];
    else pinned[k] = v;
  }
  try {
    const data = await postEvaluate(pinned);
    computedValues = data.computed || {};
    updateComputedDisplay();
  } catch (e) {
    // Silently ignore recompute errors
  }
}

function updateComputedDisplay() {
  document.querySelectorAll('.setting').forEach(el => {
    const key = el.dataset.key;
    const s = registry.settings.find(x => x.key === key);
    if (!s) return;

    const isModified = (key in pendingChanges && pendingChanges[key] !== null) || (key in overrides && !(key in pendingChanges && pendingChanges[key] === null));
    const isComputed = !isModified && key in computedValues;

    // Keep searchable value in sync
    el.dataset.value = effectiveValue(s).toLowerCase();

    // Update detail line inside expandable desc
    const detail = el.querySelector('.setting-detail');
    if (detail) {
      const unit = s.unit ? ` ${s.unit}` : '';
      const revCount = (reverseDeps[key] || []).length;
      const affectsStr = revCount > 0 ? ` | affects ${revCount}` : '';
      const computedStr = isComputed ? ` | computed: ${computedValues[key]}` : '';
      detail.textContent = `${s.key} [${s.type}] default: ${baseDefault(s)}${unit}${affectsStr}${computedStr}`;
    }

    // Toggle f(x) badge state
    const control = el.querySelector('.setting-control');
    if (!control) return;
    const badge = control.querySelector('.computed-badge');
    if (badge) {
      badge.classList.toggle('overridden', !isComputed);
      badge.title = isComputed ? 'Computed from other settings' : 'Expression overridden by user';
    }

    // Update control value for computed settings that aren't user-modified
    if (isComputed) {
      const val = String(computedValues[key]);
      if (s.type === 'bool') {
        const cb = control.querySelector('input[type="checkbox"]');
        if (cb) cb.checked = val === 'true' || val === 'True';
      } else if (s.type === 'enum') {
        const sel = control.querySelector('select');
        if (sel && sel.value !== val) sel.value = val;
      } else if (s.type === 'int' || s.type === 'float') {
        const inp = control.querySelector('input[type="number"]');
        if (inp && inp.value !== val) inp.value = val;
      } else if (s.type === 'str') {
        const ta = control.querySelector('textarea');
        if (ta && ta.value !== val) ta.value = val;
      } else {
        const inp = control.querySelector('input[type="text"]');
        if (inp && inp.value !== val) inp.value = val;
      }
    }
  });
}

// --- Controls ---

function buildControl(s, value) {
  const wrap = document.createElement('div');
  wrap.className = 'setting-control';

  if (s.type === 'bool') {
    wrap.appendChild(buildToggle(s, value));
  } else if (s.type === 'enum' && s.options) {
    wrap.appendChild(buildSelect(s, value));
  } else if (s.type === 'int' || s.type === 'float') {
    wrap.appendChild(buildStepper(s, value));
  } else if (s.type === 'str') {
    wrap.appendChild(buildTextarea(s, value));
  } else {
    wrap.appendChild(buildTextInput(s, value));
  }

  return wrap;
}

function buildToggle(s, value) {
  const label = document.createElement('label');
  label.className = 'toggle';
  const input = document.createElement('input');
  input.type = 'checkbox';
  input.checked = value === 'true' || value === true;
  input.addEventListener('change', () => onChange(s.key, input.checked ? 'true' : 'false'));
  const track = document.createElement('span');
  track.className = 'toggle-track';
  const knob = document.createElement('span');
  knob.className = 'toggle-knob';
  label.append(input, track, knob);
  return label;
}

function buildSelect(s, value) {
  const sel = document.createElement('select');
  for (const [k, lbl] of Object.entries(s.options)) {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = lbl;
    if (String(value) === k) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => onChange(s.key, sel.value));
  return sel;
}

function buildStepper(s, value) {
  const div = document.createElement('div');
  div.className = 'stepper';

  const minus = document.createElement('button');
  minus.textContent = '-';
  const input = document.createElement('input');
  input.type = 'number';
  input.value = value;
  if (s.type === 'int') input.step = '1';
  else input.step = s.minimum_value != null && s.minimum_value > 0 && s.minimum_value < 1 ? '0.01' : '0.1';
  const plus = document.createElement('button');
  plus.textContent = '+';

  const step = parseFloat(input.step);
  minus.addEventListener('click', () => stepValue(s, input, -step));
  plus.addEventListener('click', () => stepValue(s, input, step));
  input.addEventListener('change', () => onChange(s.key, input.value));

  div.append(minus, input, plus);
  return div;
}

function stepValue(s, input, delta) {
  const v = parseFloat(input.value) + delta;
  const rounded = s.type === 'int' ? Math.round(v) : parseFloat(v.toFixed(4));
  input.value = rounded;
  onChange(s.key, String(rounded));
  haptic();
}

function buildTextarea(s, value) {
  const ta = document.createElement('textarea');
  ta.value = value || '';
  ta.rows = 5;
  ta.addEventListener('input', () => onChange(s.key, ta.value));
  return ta;
}

function buildTextInput(s, value) {
  const input = document.createElement('input');
  input.type = 'text';
  input.value = value || '';
  input.addEventListener('change', () => onChange(s.key, input.value));
  return input;
}

// --- Rendering ---

function baseDefault(s) {
  if (registry.defaults[s.key] != null) return String(registry.defaults[s.key]);
  return String(s.default_value);
}

function effectiveValue(s) {
  if (s.key in overrides) return String(overrides[s.key]);
  if (s.key in computedValues) return String(computedValues[s.key]);
  return baseDefault(s);
}

function render() {
  const container = document.getElementById('settings-container');
  container.innerHTML = '';

  for (const [catName, settings] of Object.entries(registry.categories)) {
    const header = document.createElement('div');
    header.className = 'category-header';
    header.textContent = catName;
    container.appendChild(header);

    for (const s of settings) {
      container.appendChild(buildSettingRow(s));
    }
  }

  applyFilter();
  updateMainButton();
  renderClearAllBtn();
}

function buildSettingRow(s) {
  const el = document.createElement('div');
  el.className = 'setting';
  el.dataset.key = s.key;
  el.dataset.label = s.label.toLowerCase();
  el.dataset.desc = (s.description || '').toLowerCase();
  el.dataset.category = s.category || 'Other';
  el.dataset.value = effectiveValue(s).toLowerCase();

  const pendingNull = s.key in pendingChanges && pendingChanges[s.key] === null;
  const isModified = (s.key in pendingChanges && !pendingNull) || (s.key in overrides && !pendingNull);
  if (isModified) el.classList.add('modified');

  const info = document.createElement('div');
  info.className = 'setting-info';
  info.addEventListener('click', () => {
    const desc = info.querySelector('.setting-desc');
    if (desc) desc.classList.toggle('show');
  });

  const label = document.createElement('div');
  label.className = 'setting-label';
  label.textContent = s.label;

  info.appendChild(label);

  // Expandable details: description + technical info
  const desc = document.createElement('div');
  desc.className = 'setting-desc';
  if (s.description) {
    desc.textContent = s.description;
  }
  const detail = document.createElement('div');
  detail.className = 'setting-detail';
  const unit = s.unit ? ` ${s.unit}` : '';
  const revCount = (reverseDeps[s.key] || []).length;
  const affectsStr = revCount > 0 ? ` | affects ${revCount}` : '';
  const computedStr = (!isModified && s.key in computedValues) ? ` | computed: ${computedValues[s.key]}` : '';
  detail.textContent = `${s.key} [${s.type}] default: ${baseDefault(s)}${unit}${affectsStr}${computedStr}`;
  desc.appendChild(detail);
  if (s.value_expression) {
    const expr = document.createElement('div');
    expr.className = 'setting-detail';
    expr.textContent = `expr: ${s.value_expression}`;
    desc.appendChild(expr);
  }
  info.appendChild(desc);

  let val;
  if (pendingNull) val = baseDefault(s);
  else if (s.key in pendingChanges) val = pendingChanges[s.key];
  else val = effectiveValue(s);
  const control = buildControl(s, val);

  // Show f(x) badge for settings with expressions
  const isComputed = !isModified && s.key in computedValues;
  if (s.value_expression) {
    const badge = document.createElement('span');
    badge.className = 'computed-badge' + (isComputed ? '' : ' overridden');
    badge.textContent = 'f(x)';
    badge.title = isComputed ? 'Computed from other settings' : 'Expression overridden by user';
    control.insertBefore(badge, control.firstChild);
  }

  if (isModified) {
    control.appendChild(buildResetBtn(s.key));
  }

  const star = document.createElement('button');
  star.className = 'star-btn';
  star.textContent = starredKeys.has(s.key) ? '\u2605' : '\u2606';
  star.addEventListener('click', async () => {
    const isStarred = starredKeys.has(s.key);
    try {
      starredKeys = await postStarred(
        isStarred ? [] : [s.key],
        isStarred ? [s.key] : [],
      );
      star.textContent = starredKeys.has(s.key) ? '\u2605' : '\u2606';
      if (currentFilter === 'starred') applyFilter();
      haptic();
    } catch (e) {
      setStatus('Failed to update star: ' + e.message, true);
    }
  });

  el.append(star, info, control);
  return el;
}

function buildResetBtn(key) {
  const btn = document.createElement('button');
  btn.className = 'reset-btn';
  btn.textContent = '\u00d7';
  btn.title = 'Reset to default';
  btn.addEventListener('click', () => onReset(key));
  return btn;
}

// --- Events ---

const UPLOAD_TRANSFORM_KEYS = new Set(['scale', 'scale_x', 'scale_y', 'scale_z', 'rotation_x', 'rotation_y', 'rotation_z', 'batch_models']);

function onChange(key, value) {
  pendingChanges[key] = value;
  syncGlobals();
  const el = document.querySelector(`.setting[data-key="${key}"]`);
  if (el && !el.classList.contains('modified')) {
    el.classList.add('modified');
    const control = el.querySelector('.setting-control');
    if (control && !control.querySelector('.reset-btn')) {
      control.appendChild(buildResetBtn(key));
    }
  }
  updateMainButton();
  scheduleRecompute();
  if (UPLOAD_TRANSFORM_KEYS.has(key) && window._updateUploadTransforms) {
    window._updateUploadTransforms();
  }
}

function onReset(key) {
  if (key in overrides) {
    pendingChanges[key] = null;
  } else {
    delete pendingChanges[key];
  }
  syncGlobals();
  render();
  haptic();
  scheduleRecompute();
  if (UPLOAD_TRANSFORM_KEYS.has(key) && window._updateUploadTransforms) {
    window._updateUploadTransforms();
  }
}

function haptic() {
  try { WebApp && WebApp.HapticFeedback && WebApp.HapticFeedback.impactOccurred('light'); } catch(e) {}
}

function updateMainButton() {
  if (!WebApp || !WebApp.MainButton) return;
  const count = Object.keys(pendingChanges).length;
  if (count > 0) {
    WebApp.MainButton.setText(`Apply ${count} Change${count > 1 ? 's' : ''}`);
    WebApp.MainButton.show();
  } else {
    WebApp.MainButton.hide();
  }
}

// --- Search & Filter ---

let currentFilter = 'starred';

document.getElementById('search').addEventListener('input', applyFilter);
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;

    const isPresets = currentFilter === 'presets';
    const isUpload = currentFilter === 'upload';
    document.getElementById('settings-container').style.display = (isPresets || isUpload) ? 'none' : '';
    document.getElementById('presets-container').style.display = isPresets ? '' : 'none';
    document.getElementById('upload-container').style.display = isUpload ? '' : 'none';
    document.querySelector('.search-bar').style.display = (isPresets || isUpload) ? 'none' : '';

    if (isPresets) {
      renderPresetsTab();
    } else if (!isUpload) {
      applyFilter();
    }
  });
});

function applyFilter() {
  if (currentFilter === 'presets') return;

  const query = document.getElementById('search').value.toLowerCase().trim();
  const settings = document.querySelectorAll('.setting');
  const headers = document.querySelectorAll('.category-header');
  const visibleCategories = new Set();

  settings.forEach(el => {
    const key = el.dataset.key;
    const matchesSearch = !query ||
      key.includes(query) ||
      el.dataset.label.includes(query) ||
      el.dataset.desc.includes(query) ||
      el.dataset.value.includes(query);
    const matchesFilter = currentFilter === 'all' ||
      (currentFilter === 'starred' && starredKeys.has(key)) ||
      (currentFilter === 'modified' && ((key in pendingChanges && pendingChanges[key] !== null) || (key in overrides && !(key in pendingChanges && pendingChanges[key] === null))));

    if (matchesSearch && matchesFilter) {
      el.classList.remove('hidden');
      visibleCategories.add(el.dataset.category);
    } else {
      el.classList.add('hidden');
    }
  });

  headers.forEach(h => {
    h.style.display = visibleCategories.has(h.textContent) ? '' : 'none';
  });
}

// --- Presets ---

function resolveSettingLabel(key) {
  if (!registry) return key;
  const s = registry.settings.find(x => x.key === key);
  return s ? s.label : key;
}

function renderPresetsTab() {
  const container = document.getElementById('presets-container');
  container.innerHTML = '';
  if (!registry || !registry.presets) return;

  for (const [name, preset] of Object.entries(registry.presets)) {
    container.appendChild(buildPresetRow(name, preset));
  }
}

function buildPresetRow(name, preset) {
  const row = document.createElement('div');
  row.className = 'preset-row';

  const info = document.createElement('div');
  info.className = 'setting-info';

  const label = document.createElement('div');
  label.className = 'setting-label';
  label.textContent = name.charAt(0).toUpperCase() + name.slice(1);

  const desc = document.createElement('div');
  desc.className = 'setting-desc';

  if (preset.description) {
    const descText = document.createElement('div');
    descText.textContent = preset.description;
    descText.style.marginBottom = '6px';
    desc.appendChild(descText);
  }

  for (const [k, v] of Object.entries(preset.settings)) {
    const item = document.createElement('div');
    item.className = 'preset-detail-item';
    item.textContent = `${resolveSettingLabel(k)}: ${v}`;
    desc.appendChild(item);
  }

  const applyBtn = document.createElement('button');
  applyBtn.className = 'preset-apply-btn';
  applyBtn.textContent = 'Apply';
  applyBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    for (const [k, v] of Object.entries(preset.settings)) {
      pendingChanges[k] = String(v);
    }
    // Switch to Modified tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const modTab = document.querySelector('.tab[data-filter="modified"]');
    if (modTab) modTab.classList.add('active');
    currentFilter = 'modified';
    document.getElementById('settings-container').style.display = '';
    document.getElementById('presets-container').style.display = 'none';
    document.querySelector('.search-bar').style.display = '';

    render();
    haptic();
    scheduleRecompute();
    setStatus(`Preset '${name}' staged`);
  });

  info.append(label, desc);
  row.append(info, applyBtn);

  row.addEventListener('click', () => {
    desc.classList.toggle('show');
  });

  return row;
}

function renderClearAllBtn() {
  const container = document.getElementById('clear-all-container');
  container.innerHTML = '';
  const hasOverrides = Object.keys(overrides).length > 0 || Object.keys(pendingChanges).length > 0;
  if (!hasOverrides) return;

  const btn = document.createElement('button');
  btn.className = 'clear-all-btn';
  btn.textContent = 'Clear All';
  btn.title = 'Remove all overrides';
  btn.addEventListener('click', async () => {
    try {
      await deleteSettings();
      overrides = {};
      pendingChanges = {};
      syncGlobals();
      render();
      renderClearAllBtn();
      recompute();
      haptic();
      setStatus('All overrides cleared');
    } catch (e) {
      setStatus('Failed to clear: ' + e.message, true);
    }
  });
  container.appendChild(btn);
}

// --- Apply ---

if (WebApp && WebApp.MainButton) WebApp.MainButton.onClick(async () => {
  WebApp.MainButton.showProgress();
  setStatus('Applying...');

  const toSet = {};
  const toRemove = [];
  for (const [key, value] of Object.entries(pendingChanges)) {
    if (value === null) toRemove.push(key);
    else toSet[key] = value;
  }

  try {
    const result = await postSettings({ overrides: toSet, remove: toRemove });
    WebApp.MainButton.hideProgress();

    const errorKeys = Object.keys(result.errors || {});
    const warningKeys = Object.keys(result.warnings || {});
    const appliedKeys = Object.keys(result.applied || {});

    if (errorKeys.length > 0) {
      const msgs = errorKeys.map(k => `${k}: ${result.errors[k]}`);
      setStatus('Errors: ' + msgs.join('; '), true);
      for (const k of appliedKeys) {
        overrides[k] = result.applied[k];
        delete pendingChanges[k];
      }
      render();
      recompute();
    } else {
      for (const k of appliedKeys) overrides[k] = result.applied[k];
      for (const k of toRemove) delete overrides[k];
      pendingChanges = {};
      syncGlobals();
      render();
      recompute();

      let msg = `Applied ${appliedKeys.length} setting${appliedKeys.length !== 1 ? 's' : ''}`;
      if (warningKeys.length > 0) {
        const wMsgs = warningKeys.map(k => `${k}: ${result.warnings[k]}`);
        msg += '. Warnings: ' + wMsgs.join('; ');
      }
      setStatus(msg);

    }
  } catch (e) {
    WebApp.MainButton.hideProgress();
    setStatus('Network error: ' + e.message, true);
  }
});

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
  if (!isError) {
    setTimeout(() => { el.textContent = ''; }, 5000);
  }
}
window.setStatus = setStatus;

// --- Init ---

async function init() {
  if (!API_BASE) {
    document.getElementById('loading').textContent = 'Error: no API URL provided.';
    return;
  }

  try {
    const [reg, settings, starred] = await Promise.all([
      fetchRegistry(), fetchSettings(), fetchStarred(),
    ]);
    registry = reg;
    overrides = settings;
    original = { ...settings };
    starredKeys = starred;
    reverseDeps = reg.reverse_deps || {};
    syncGlobals();

    document.getElementById('loading').remove();
    renderPresetsTab();
    render();
    recompute();
  } catch (e) {
    document.getElementById('loading').textContent = 'Failed to load: ' + e.message;
  }
}

init();
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Aliases for globals from the main script
const API_BASE = window.API_BASE;
const TOKEN = window.TOKEN;
const handleAuthError = (...a) => window.handleAuthError(...a);
const setStatus = (...a) => window.setStatus(...a);

// --- Three.js upload scene ---

let scene, camera, renderer, controls;
let modelMeshes = [];  // array of THREE.Mesh for batch mode
let modelMesh = null;  // single mesh for individual mode
let originalGeometry = null;
let transformedBoxHelper = null;
let bedBox = null;
let originWidget = null;
let uploadFileId = null;
let sceneReady = false;
let animating = false;

// Batch state
let packedBeds = null;  // array of beds, each bed is [{index, name, offset_x, offset_y}, ...]
let activeBedIndex = 0;
let stlCache = {};  // index -> ArrayBuffer, avoid re-fetching
let overflowModels = new Set();  // indices of models that don't fit the bed



function weblog(msg) {
  fetch(API_BASE + '/api/log', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ msg: String(msg) }),
  }).catch(() => {});
}

function isBatchMode() {
  const pc = window.pendingChanges || {};
  const ov = window.overrides || {};
  const defs = (window.registry && window.registry.defaults) || {};
  const raw = (pc['batch_models'] !== undefined && pc['batch_models'] !== null) ? pc['batch_models']
    : (ov['batch_models'] !== undefined ? ov['batch_models']
    : (defs['batch_models'] !== undefined ? defs['batch_models'] : false));
  return raw === true || raw === 'true' || raw === 'True';
}

function initScene() {
  if (sceneReady) return;
  const container = document.getElementById('upload-viewport');

  scene = new THREE.Scene();
  const width = container.clientWidth;
  const height = container.clientHeight || 300;

  camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 10000);
  camera.up.set(0, 0, 1);
  camera.position.set(200, -200, 150);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0x666666));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(1, 1, 1);
  scene.add(dirLight);
  const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dirLight2.position.set(-1, -0.5, -1);
  scene.add(dirLight2);

  sceneReady = true;
  startAnimate();
}

function startAnimate() {
  if (animating) return;
  animating = true;
  function loop() {
    if (!animating) return;
    requestAnimationFrame(loop);
    controls.update();
    renderer.render(scene, camera);
  }
  loop();
}

function stopAnimate() {
  animating = false;
}

function loadSTL(arrayBuffer) {
  initScene();
  const loader = new STLLoader();
  const geometry = loader.parse(arrayBuffer);

  // Clean up old model
  if (modelMesh) {
    scene.remove(modelMesh);
    modelMesh.geometry.dispose();
    modelMesh.material.dispose();
  }
  if (transformedBoxHelper) { scene.remove(transformedBoxHelper); transformedBoxHelper = null; }
  if (bedBox) { scene.remove(bedBox); bedBox = null; }

  // Center geometry at origin so rotation/scale pivot correctly
  geometry.computeBoundingBox();
  const geoCenter = new THREE.Vector3();
  geometry.boundingBox.getCenter(geoCenter);
  geometry.translate(-geoCenter.x, -geoCenter.y, -geometry.boundingBox.min.z);
  geometry.computeBoundingBox();

  const material = new THREE.MeshPhongMaterial({
    color: 0x4488cc,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
  });
  modelMesh = new THREE.Mesh(geometry, material);
  scene.add(modelMesh);

  originalGeometry = geometry;

  // Add bed outline
  addBedOutline();

  // Fit camera to model
  const size = new THREE.Vector3();
  geometry.boundingBox.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const hz = size.z / 2;
  camera.position.set(maxDim * 1.5, -maxDim * 1.2, hz + maxDim);
  controls.target.set(0, 0, hz);
  controls.update();

  updateTransforms();
}

function addBedOutline() {
  if (bedBox) { scene.remove(bedBox); bedBox = null; }
  const bed = getBedDims();
  if (!bed) return;

  const geo = new THREE.BufferGeometry();
  const hw = bed.width / 2, hd = bed.depth / 2;
  const verts = new Float32Array([
    -hw, -hd, 0, hw, -hd, 0,
    hw, -hd, 0, hw, hd, 0,
    hw, hd, 0, -hw, hd, 0,
    -hw, hd, 0, -hw, -hd, 0,
  ]);
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  bedBox = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0x888888, opacity: 0.5, transparent: true }));
  scene.add(bedBox);

  // Origin corner widget: colored axes at (0,0) = (-hw, -hd) in scene coords
  if (originWidget) { scene.remove(originWidget); originWidget = null; }
  const g = new THREE.Group();
  const len = Math.min(bed.width, bed.depth) * 0.08;
  const ax = (pts, col) => {
    const bg = new THREE.BufferGeometry().setFromPoints(pts);
    g.add(new THREE.Line(bg, new THREE.LineBasicMaterial({ color: col })));
  };
  ax([new THREE.Vector3(-hw, -hd, 0), new THREE.Vector3(-hw + len, -hd, 0)], 0xff0000);
  ax([new THREE.Vector3(-hw, -hd, 0), new THREE.Vector3(-hw, -hd + len, 0)], 0x00cc00);
  ax([new THREE.Vector3(-hw, -hd, 0), new THREE.Vector3(-hw, -hd, len)], 0x4444ff);
  scene.add(g);
  originWidget = g;
}

function getBedDims() {
  if (!window.registry) return null;
  function findDefault(key) {
    if (window.registry.defaults && window.registry.defaults[key] != null) return parseFloat(window.registry.defaults[key]);
    const s = window.registry.settings.find(x => x.key === key);
    return s ? parseFloat(s.default_value) : null;
  }
  const w = findDefault('machine_width');
  const d = findDefault('machine_depth');
  const h = findDefault('machine_height');
  if (w == null || d == null || h == null) return null;
  return { width: w, depth: d, height: h };
}

function getTransformVal(key, fallback) {
  const pc = window.pendingChanges || {};
  const ov = window.overrides || {};
  const defs = (window.registry && window.registry.defaults) || {};
  if (key in pc && pc[key] !== null) return parseFloat(pc[key]);
  // pendingChanges[key] === null means "revert to default", skip overrides
  if (!(key in pc) && key in ov) return parseFloat(ov[key]);
  if (key in defs) return parseFloat(defs[key]);
  return fallback;
}

function updateTransforms() {
  if (!modelMesh || !originalGeometry) return;

  const masterScale = getTransformVal('scale', 100);
  const sx = getTransformVal('scale_x', masterScale);
  const sy = getTransformVal('scale_y', masterScale);
  const sz = getTransformVal('scale_z', masterScale);
  const rx = getTransformVal('rotation_x', 0);
  const ry = getTransformVal('rotation_y', 0);
  const rz = getTransformVal('rotation_z', 0);

  modelMesh.scale.set(sx / 100, sy / 100, sz / 100);
  modelMesh.rotation.set(
    rx * Math.PI / 180,
    ry * Math.PI / 180,
    rz * Math.PI / 180,
    'ZYX',
  );

  // Update transformed bbox
  if (transformedBoxHelper) scene.remove(transformedBoxHelper);
  const transformedBox = new THREE.Box3().setFromObject(modelMesh);
  transformedBoxHelper = new THREE.Box3Helper(transformedBox, 0xee8833);
  scene.add(transformedBoxHelper);

  updateDimsDisplay();
}

function updateDimsDisplay() {
  if (!originalGeometry || !originalGeometry.boundingBox) return;
  const dimsEl = document.getElementById('upload-dims');

  const origSize = new THREE.Vector3();
  originalGeometry.boundingBox.getSize(origSize);

  const transBox = new THREE.Box3().setFromObject(modelMesh);
  const transSize = new THREE.Vector3();
  transBox.getSize(transSize);

  const bed = getBedDims();
  const warnings = [];
  if (bed) {
    if (transSize.x > bed.width) warnings.push('X');
    if (transSize.y > bed.depth) warnings.push('Y');
    if (transSize.z > bed.height) warnings.push('Z');
  }

  const fmt = v => v.toFixed(1);
  let html = '';
  html += '<div class="upload-dims-header"></div><div class="upload-dims-header">Original</div><div class="upload-dims-header">Transformed</div>';
  html += `<div class="upload-dims-axis">X</div><div>${fmt(origSize.x)} mm</div><div>${fmt(transSize.x)} mm</div>`;
  html += `<div class="upload-dims-axis">Y</div><div>${fmt(origSize.y)} mm</div><div>${fmt(transSize.y)} mm</div>`;
  html += `<div class="upload-dims-axis">Z</div><div>${fmt(origSize.z)} mm</div><div>${fmt(transSize.z)} mm</div>`;
  if (bed) {
    html += `<div class="upload-dims-bed">Bed: ${fmt(bed.width)} × ${fmt(bed.depth)} × ${fmt(bed.height)} mm</div>`;
  }
  if (warnings.length > 0) {
    html += `<div class="upload-dims-warn">Exceeds bed in ${warnings.join(', ')}!</div>`;
  }
  dimsEl.innerHTML = html;
}

// --- Batch preview helpers ---

function clearSceneMeshes() {
  if (modelMesh) {
    scene.remove(modelMesh);
    modelMesh.geometry.dispose();
    modelMesh.material.dispose();
    modelMesh = null;
  }
  for (const m of modelMeshes) {
    scene.remove(m);
    m.geometry.dispose();
    m.material.dispose();
  }
  modelMeshes = [];
  originalGeometry = null;
  if (transformedBoxHelper) { scene.remove(transformedBoxHelper); transformedBoxHelper = null; }
  if (bedBox) { scene.remove(bedBox); bedBox = null; }
  if (originWidget) { scene.remove(originWidget); originWidget = null; }
}

async function fetchSTL(index) {
  if (stlCache[index]) return stlCache[index];
  const r = await fetch(API_BASE + `/api/upload/${uploadFileId}/model?index=${index}`, {
    headers: { 'Authorization': 'Bearer ' + TOKEN },
  });
  if (!r.ok) throw new Error('Failed to fetch model ' + index);
  const buf = await r.arrayBuffer();
  stlCache[index] = buf;
  return buf;
}

async function fetchPackLayout() {
  if (!uploadFileId) return null;
  const indices = [...checkedModels].sort();
  if (indices.length === 0) return null;
  try {
    const r = await fetch(API_BASE + `/api/upload/${uploadFileId}/pack`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + TOKEN,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ indices }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      weblog('Pack error: ' + r.status + ' ' + JSON.stringify(err));
      return null;
    }
    return await r.json();
  } catch (e) {
    weblog('Pack fetch error: ' + e.message);
    return null;
  }
}

async function loadBedPreview(bedIndex) {
  if (!packedBeds || bedIndex >= packedBeds.length) return;
  try {
  initScene();
  clearSceneMeshes();

  const bed = packedBeds[bedIndex];
  const loader = new STLLoader();
  const colors = [0x4488cc, 0xcc8844, 0x44cc88, 0x8844cc, 0xcc4488, 0x88cc44];
  const combined = new THREE.Box3();

  for (let i = 0; i < bed.length; i++) {
    const item = bed[i];
    const buf = await fetchSTL(item.index);
    const geometry = loader.parse(buf.slice(0));  // slice to avoid detached buffer issues

    const material = new THREE.MeshPhongMaterial({
      color: colors[i % colors.length],
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
    });
    // Center geometry at origin (STL vertices may start at arbitrary positions)
    geometry.computeBoundingBox();
    const geoCenter = new THREE.Vector3();
    geometry.boundingBox.getCenter(geoCenter);
    geometry.translate(-geoCenter.x, -geoCenter.y, -geometry.boundingBox.min.z);

    const mesh = new THREE.Mesh(geometry, material);

    // Apply scale only — rotation is ignored in batch mode because the
    // pack layout was computed from unrotated convex hulls
    const masterScale = getTransformVal('scale', 100);
    const sx = getTransformVal('scale_x', masterScale);
    const sy = getTransformVal('scale_y', masterScale);
    const sz = getTransformVal('scale_z', masterScale);
    mesh.scale.set(sx / 100, sy / 100, sz / 100);

    // Position at packed offset (offset is relative to bed center, which is scene origin)
    mesh.position.set(item.offset_x, item.offset_y, 0);

    scene.add(mesh);
    modelMeshes.push(mesh);

    const meshBox = new THREE.Box3().setFromObject(mesh);
    combined.union(meshBox);
  }

  // Add bed outline
  addBedOutline();

  // Add combined bounding box (orange)
  transformedBoxHelper = new THREE.Box3Helper(combined, 0xee8833);
  scene.add(transformedBoxHelper);

  // Fit camera to combined view
  const center = new THREE.Vector3();
  combined.getCenter(center);
  const size = new THREE.Vector3();
  combined.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z, 50);
  camera.position.set(center.x + maxDim * 1.5, center.y - maxDim * 1.2, center.z + maxDim);
  controls.target.copy(center);
  controls.update();

  // kept for debugging: weblog(`bed render: ${modelMeshes.length} meshes, size=(${size.x.toFixed(1)},${size.y.toFixed(1)},${size.z.toFixed(1)})`);

  // Update bed nav UI
  updateBedNav();
  updateBatchDimsDisplay(bed);
  } catch (e) { weblog('Bed render error: ' + e.message); }
}

function updateBedNav() {
  const nav = document.getElementById('upload-bed-nav');
  if (!packedBeds || packedBeds.length <= 1) {
    nav.style.display = 'none';
    return;
  }
  nav.style.display = '';
  document.getElementById('bed-label').textContent = `Bed ${activeBedIndex + 1}/${packedBeds.length}`;
  document.getElementById('bed-prev').disabled = activeBedIndex === 0;
  document.getElementById('bed-next').disabled = activeBedIndex >= packedBeds.length - 1;
}

function updateBatchDimsDisplay(bed) {
  const dimsEl = document.getElementById('upload-dims');
  const bedDims = getBedDims();
  const fmt = v => v.toFixed(1);
  const names = bed.map(m => m.name).join(', ');
  let html = `<div class="upload-dims-bed" style="grid-column:1/4">${bed.length} model${bed.length > 1 ? 's' : ''}: ${names}</div>`;
  if (bedDims) {
    html += `<div class="upload-dims-bed">Bed: ${fmt(bedDims.width)} × ${fmt(bedDims.depth)} × ${fmt(bedDims.height)} mm</div>`;
  }
  dimsEl.innerHTML = html;
}

async function enterBatchMode() {
  if (!uploadFileId) return;
  if (checkedModels.size === 0) {
    packedBeds = null;
    activeBedIndex = 0;
    overflowModels = new Set();
    clearSceneMeshes();
    document.getElementById('upload-bed-nav').style.display = 'none';
    document.getElementById('upload-dims').innerHTML = '';
    renderModelList();
    updateSliceButton();
    setStatus('No models selected');
    return;
  }
  setStatus('Computing bed layout...');
  const result = await fetchPackLayout();
  if (!result || !result.beds || result.beds.length === 0) {
    setStatus('Failed to compute bed layout', true);
    // Fall back to individual preview
    packedBeds = null;
    activeBedIndex = 0;
    document.getElementById('upload-bed-nav').style.display = 'none';
    await loadModelByIndex(activeModelIndex);
    renderModelList();
    return;
  }
  packedBeds = result.beds;
  activeBedIndex = 0;

  // Track models that don't fit the bed
  overflowModels = new Set();
  for (const bed of packedBeds) for (const item of bed) {
    if (item.overflow) overflowModels.add(item.index);
  }

  document.getElementById('upload-viewport').style.display = '';
  document.getElementById('upload-dims').style.display = '';
  document.getElementById('upload-actions').style.display = '';
  await loadBedPreview(0);
  renderModelList();
  updateSliceButton();

  const packed = packedBeds.reduce((n, bed) => n + bed.length, 0);
  setStatus(`Packed ${packed} model${packed > 1 ? 's' : ''} into ${packedBeds.length} bed${packedBeds.length > 1 ? 's' : ''}`);
}

function exitBatchMode() {
  packedBeds = null;
  activeBedIndex = 0;
  stlCache = {};
  overflowModels = new Set();
  document.getElementById('upload-bed-nav').style.display = 'none';
  // Reload current individual model
  if (uploadFileId && uploadModels.length > 0) {
    loadModelByIndex(activeModelIndex);
  }
  renderModelList();
}

// --- File upload ---

const zone = document.getElementById('upload-zone');
const fileInput = document.getElementById('upload-input');
const zoneText = document.getElementById('upload-zone-text');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', (e) => {
  e.preventDefault();
  zone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
});

let uploadModels = [];
let checkedModels = new Set();  // indices of models selected for slicing
let activeModelIndex = 0;

async function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['stl', '3mf', 'zip'].includes(ext)) {
    setStatus('Unsupported file type. Send STL, 3MF, or ZIP.', true);
    return;
  }

  zoneText.textContent = file.name;
  zone.classList.add('has-file');
  document.getElementById('upload-result').innerHTML = '';

  // Upload to server
  setStatus('Uploading...');
  const formData = new FormData();
  formData.append('file', file);

  try {
    const r = await fetch(API_BASE + '/api/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN },
      body: formData,
    });
    if (handleAuthError(r)) return;
    if (!r.ok) {
      const err = await r.json();
      setStatus(err.error || 'Upload failed', true);
      return;
    }
    const data = await r.json();
    uploadFileId = data.file_id;
    uploadModels = data.models || [];
    checkedModels = new Set(uploadModels.map((_, i) => i));

    // Show model list if ZIP with multiple models
    if (uploadModels.length > 1) {
      renderModelList();
    } else {
      document.getElementById('upload-model-list').style.display = 'none';
    }

    // Batch mode: compute packing and show bed preview
    if (isBatchMode() && uploadModels.length > 1) {
      await enterBatchMode();
    } else {
      await loadModelByIndex(0);
    }
    updateSliceButton();
  } catch (e) {
    setStatus('Upload error: ' + e.message, true);
  }
}

function renderModelList() {
  const listEl = document.getElementById('upload-model-list');
  const allChecked = checkedModels.size === uploadModels.length;
  let html = `<div class="upload-model-list-header">
    <span>${checkedModels.size}/${uploadModels.length} selected</span>
    <button id="upload-toggle-all">${allChecked ? 'Deselect all' : 'Select all'}</button>
  </div>`;

  if (packedBeds) {
    // Batch mode: group models by bed
    const packedIndices = new Set();
    for (let b = 0; b < packedBeds.length; b++) {
      const bed = packedBeds[b];
      const active = b === activeBedIndex ? ' active' : '';
      html += `<div class="upload-model-bed-header${active}" data-bed="${b}">Bed ${b + 1} (${bed.length} model${bed.length > 1 ? 's' : ''})</div>`;
      for (const item of bed) {
        packedIndices.add(item.index);
        const warn = overflowModels.has(item.index) ? '<span style="color:#e8a820" title="Does not fit on bed">\u26a0</span> ' : '';
        html += `<div class="upload-model-item" data-index="${item.index}" data-bed="${b}">
          <input type="checkbox" checked data-cb-index="${item.index}">
          <span class="model-name">${warn}${item.name}</span>
        </div>`;
      }
    }
    // Unchecked models
    const unchecked = [];
    for (let i = 0; i < uploadModels.length; i++) {
      if (!checkedModels.has(i) && !packedIndices.has(i)) unchecked.push(i);
    }
    if (unchecked.length > 0) {
      html += `<div class="upload-model-bed-header" style="color:var(--hint)">Unchecked (${unchecked.length})</div>`;
      for (const idx of unchecked) {
        html += `<div class="upload-model-item" data-index="${idx}">
          <input type="checkbox" data-cb-index="${idx}">
          <span class="model-name" style="color:var(--hint)">${uploadModels[idx]}</span>
        </div>`;
      }
    }
  } else {
    // Individual mode: flat list
    for (let i = 0; i < uploadModels.length; i++) {
      const checked = checkedModels.has(i) ? 'checked' : '';
      const active = i === activeModelIndex ? ' active' : '';
      html += `<div class="upload-model-item${active}" data-index="${i}">
        <input type="checkbox" ${checked} data-cb-index="${i}">
        <span class="model-name">${uploadModels[i]}</span>
      </div>`;
    }
  }

  listEl.innerHTML = html;
  listEl.style.display = '';

  // Toggle all
  document.getElementById('upload-toggle-all').addEventListener('click', (e) => {
    e.stopPropagation();
    if (checkedModels.size === uploadModels.length) {
      checkedModels.clear();
    } else {
      checkedModels = new Set(uploadModels.map((_, i) => i));
    }
    renderModelList();
    updateSliceButton();
    if (isBatchMode() && uploadModels.length > 1) enterBatchMode();
  });

  // Bed header clicks: switch to that bed's preview
  for (const header of listEl.querySelectorAll('.upload-model-bed-header')) {
    header.addEventListener('click', () => {
      activeBedIndex = parseInt(header.dataset.bed);
      loadBedPreview(activeBedIndex);
      renderModelList();
    });
  }

  // Row clicks: checkbox area toggles check, name area switches preview
  for (const item of listEl.querySelectorAll('.upload-model-item')) {
    const idx = parseInt(item.dataset.index);
    const cb = item.querySelector('input[type="checkbox"]');
    cb.addEventListener('click', (e) => {
      e.stopPropagation();
      if (cb.checked) checkedModels.add(idx);
      else checkedModels.delete(idx);
      renderModelList();
      updateSliceButton();
      // Recompute packing when selection changes in batch mode
      if (isBatchMode() && uploadModels.length > 1) enterBatchMode();
    });
    item.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (!checkedModels.has(idx)) {
        // Clicking a deselected model name selects it
        checkedModels.add(idx);
        renderModelList();
        updateSliceButton();
        if (isBatchMode() && uploadModels.length > 1) enterBatchMode();
        else loadModelByIndex(idx);
        return;
      }
      if (packedBeds) {
        // In batch mode, tap a model name to jump to its bed
        const bedIdx = parseInt(item.dataset.bed);
        if (!isNaN(bedIdx) && bedIdx !== activeBedIndex) {
          activeBedIndex = bedIdx;
          loadBedPreview(activeBedIndex);
          renderModelList();
        }
      } else {
        loadModelByIndex(idx);
      }
    });
  }
}

function updateSliceButton() {
  const btn = document.getElementById('upload-slice-btn');
  if (uploadModels.length > 1) {
    const sliceable = checkedModels.size;
    btn.textContent = `Slice (${sliceable}/${uploadModels.length})`;
    btn.disabled = sliceable <= 0;
  } else {
    btn.textContent = 'Slice';
    btn.disabled = false;
  }
}

async function loadModelByIndex(index) {
  if (!uploadFileId) return;
  activeModelIndex = index;
  const modelResp = await fetch(API_BASE + `/api/upload/${uploadFileId}/model?index=${index}`, {
    headers: { 'Authorization': 'Bearer ' + TOKEN },
  });
  if (!modelResp.ok) {
    setStatus('Failed to load model for preview', true);
    return;
  }
  const buf = await modelResp.arrayBuffer();

  document.getElementById('upload-viewport').style.display = '';
  document.getElementById('upload-dims').style.display = '';
  document.getElementById('upload-actions').style.display = '';

  loadSTL(buf);

  // Update active highlight in model list
  if (uploadModels.length > 1) renderModelList();
}

// --- Slicing ---

const sliceBtn = document.getElementById('upload-slice-btn');
sliceBtn.addEventListener('click', startSlice);

async function startSlice() {
  if (!uploadFileId) return;
  if (uploadModels.length > 1 && checkedModels.size === 0) return;
  sliceBtn.disabled = true;
  sliceBtn.textContent = 'Slicing...';
  document.getElementById('upload-result').innerHTML = '';
  setStatus('Slicing...');

  const body = uploadModels.length > 1 ? {indices: [...checkedModels].sort()} : {};
  try {
    const r = await fetch(API_BASE + `/api/upload/${uploadFileId}/slice`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + TOKEN,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (handleAuthError(r)) return;
    if (!r.ok) {
      const err = await r.json();
      showResult(false, err.error || 'Failed to start slicing');
      return;
    }

    // Poll for status
    pollStatus();
  } catch (e) {
    showResult(false, 'Slice error: ' + e.message);
  }
}

async function pollStatus() {
  try {
    const r = await fetch(API_BASE + `/api/upload/${uploadFileId}/status`, {
      headers: { 'Authorization': 'Bearer ' + TOKEN },
    });
    if (handleAuthError(r)) return;
    const data = await r.json();

    if (data.status === 'slicing') {
      setTimeout(pollStatus, 2000);
      return;
    }

    if (data.status === 'done') {
      // Multi-model results (ZIP)
      if (data.results) {
        const ok = data.results.filter(r => r.success).length;
        const total = data.results.length;
        const lines = [`${ok}/${total} sliced.`];
        let totalTime = 0, totalFilament = 0;
        for (const r of data.results) {
          if (r.success && r.stats && r.stats.time_seconds != null) {
            lines.push(`${r.name} — ${formatDuration(r.stats.time_seconds)}, ${r.stats.filament_meters}m`);
            totalTime += r.stats.time_seconds;
            totalFilament += r.stats.filament_meters;
          } else if (!r.success) {
            lines.push(`Failed: ${r.name} — ${r.message}`);
          }
        }
        if (ok > 1) lines.push(`\nTotal: ${formatDuration(totalTime)}, ${Math.round(totalFilament * 100) / 100}m`);
        if (data.results[0]?.archive_path) lines.push(`Archived to: ${data.results[0].archive_path}`);
        showResult(ok === total, lines.join('\n'));
      }
      // Single-model result
      else if (data.success) {
        let msg = 'Slicing completed!';
        if (data.archive_path) msg += `\nArchived to: ${data.archive_path}`;
        if (data.stats && data.stats.time_seconds != null) {
          msg += `\nTime: ${formatDuration(data.stats.time_seconds)} | Filament: ${data.stats.filament_meters}m`;
        }
        showResult(true, msg);
      } else {
        showResult(false, data.message || 'Slicing failed');
      }
    }
  } catch (e) {
    showResult(false, 'Status check failed: ' + e.message);
  }
}

function formatDuration(t) {
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  const parts = [];
  if (h) parts.push(h + 'h');
  if (h || m) parts.push(m + 'm');
  parts.push(s + 's');
  return parts.join(' ');
}

function showResult(success, message) {
  updateSliceButton();
  setStatus(success ? 'Done!' : 'Failed', !success);
  const el = document.getElementById('upload-result');
  el.className = 'upload-result ' + (success ? 'success' : 'failure');
  el.textContent = message;
}

// --- Clear upload ---

const clearBtn = document.getElementById('upload-clear-btn');
clearBtn.addEventListener('click', clearUpload);

async function clearUpload() {
  if (uploadFileId) {
    try {
      await fetch(API_BASE + `/api/upload/${uploadFileId}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + TOKEN },
      });
    } catch (_) { /* ignore */ }
  }
  uploadFileId = null;

  if (sceneReady) clearSceneMeshes();

  uploadModels = [];
  checkedModels.clear();
  activeModelIndex = 0;
  packedBeds = null;
  activeBedIndex = 0;
  stlCache = {};
  overflowModels = new Set();
  document.getElementById('upload-model-list').style.display = 'none';
  document.getElementById('upload-bed-nav').style.display = 'none';
  document.getElementById('upload-viewport').style.display = 'none';
  document.getElementById('upload-dims').style.display = 'none';
  document.getElementById('upload-actions').style.display = 'none';
  document.getElementById('upload-result').innerHTML = '';
  document.getElementById('upload-slice-btn').disabled = true;
  document.getElementById('upload-slice-btn').textContent = 'Slice';

  zoneText.innerHTML = 'Drag &amp; drop or tap to select<br>STL / 3MF / ZIP';
  zone.classList.remove('has-file');
  fileInput.value = '';

  setStatus('');
}

// --- Visibility ---

const observer = new MutationObserver(() => {
  const visible = document.getElementById('upload-container').style.display !== 'none';
  if (visible && sceneReady) startAnimate();
  else if (!visible) stopAnimate();
});
observer.observe(document.getElementById('upload-container'), { attributes: true, attributeFilter: ['style'] });

// --- Bed navigation ---

document.getElementById('bed-prev').addEventListener('click', () => {
  if (activeBedIndex > 0) {
    activeBedIndex--;
    loadBedPreview(activeBedIndex);
    if (uploadModels.length > 1) renderModelList();
  }
});
document.getElementById('bed-next').addEventListener('click', () => {
  if (packedBeds && activeBedIndex < packedBeds.length - 1) {
    activeBedIndex++;
    loadBedPreview(activeBedIndex);
    if (uploadModels.length > 1) renderModelList();
  }
});

// Expose for onChange hook — handle batch mode toggle and transform changes
window._updateUploadTransforms = function() {
  if (!uploadFileId) return;
  const batch = isBatchMode() && uploadModels.length > 1;
  const wasBatch = packedBeds !== null;
  if (batch && !wasBatch) {
    enterBatchMode();
  } else if (!batch && wasBatch) {
    exitBatchMode();
  } else if (batch) {
    // Transforms changed in batch mode — recompute packing (scale affects model footprint)
    enterBatchMode();
  } else {
    updateTransforms();
  }
};
</script>
